<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Терминал • NFC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        .terminal { background: linear-gradient(180deg, #052005, #0a1a0a); }
        .nfc-glow { animation: glow 2s infinite alternate; }
        @keyframes glow { from { text-shadow: 0 0 20px #22c55e; } to { text-shadow: 0 0 50px #22c55e; } }
    </style>
</head>
<body class="bg-zinc-950 text-white">
    <div class="max-w-md mx-auto min-h-screen terminal flex flex-col border border-emerald-500">
        <div class="h-16 bg-emerald-600 flex items-center px-6 text-black font-bold text-3xl tracking-tighter">СБЕР</div>
        
        <div class="flex-1 flex flex-col p-8">
            <div id="idle" class="flex-1 flex flex-col items-center justify-center text-center">
                <div onclick="connectTerminal()" class="w-64 h-64 rounded-3xl border-8 border-emerald-400 flex items-center justify-center nfc-glow cursor-pointer">
                    <div class="text-center">
                        <i class="fa-solid fa-nfc-symbol text-8xl text-emerald-400"></i>
                        <div class="mt-8 text-emerald-300 text-sm">ПРИКЛАДЫВАЙ МЕТКУ</div>
                    </div>
                </div>
                <div class="mt-12 text-xs text-emerald-400 font-mono" id="aid-show">AID: —</div>
            </div>

            <div id="payment" class="hidden flex-1 flex flex-col items-center justify-center text-center">
                <div class="text-emerald-400 text-sm tracking-widest">ОПЛАТА</div>
                <div id="pay-amount" class="text-7xl font-light text-white mt-6">890</div>
                <div class="text-zinc-400">рублей</div>
                <button onclick="processPayment()" class="mt-16 bg-white text-black px-16 py-6 rounded-3xl font-bold text-xl">ОПЛАТИТЬ МЕТКОЙ</button>
            </div>

            <div id="success" class="hidden flex-1 flex flex-col items-center justify-center">
                <i class="fa-solid fa-check-circle text-emerald-400 text-[140px]"></i>
                <div class="text-4xl font-light mt-8 text-emerald-400">ОПЛАЧЕНО</div>
                <button onclick="resetTerminal()" class="mt-16 px-12 py-5 border border-emerald-400 rounded-3xl">НОВАЯ ОПЕРАЦИЯ</button>
            </div>
        </div>

        <div class="h-14 bg-black border-t border-emerald-900 flex items-center px-6 text-xs">
            <input id="aid-input" placeholder="Введите AID из кассы" class="flex-1 bg-transparent outline-none text-emerald-300 font-mono">
            <button onclick="connectTerminal()" class="ml-4 bg-emerald-500 text-black px-8 py-3 rounded-2xl text-xs font-bold">ПОДКЛЮЧИТЬ</button>
        </div>
    </div>

    <script>
        let currentAID = "";
        let currentAmount = 0;

        function connectTerminal() {
            let input = document.getElementById('aid-input').value.trim().toUpperCase();
            if (!input) input = "KX9P2M"; // default for demo
            currentAID = input;
            document.getElementById('aid-show').textContent = "AID: " + currentAID;
            
            const pending = JSON.parse(localStorage.getItem('pending_payment') || '{}');
            if (pending.aid === currentAID) {
                currentAmount = pending.amount;
                document.getElementById('idle').classList.add('hidden');
                document.getElementById('payment').classList.remove('hidden');
                document.getElementById('pay-amount').textContent = currentAmount;
            }
        }

        function processPayment() {
            document.getElementById('payment').classList.add('hidden');
            document.getElementById('success').classList.remove('hidden');
            
            localStorage.setItem('payment_completed', JSON.stringify({amount: currentAmount, aid: currentAID}));
            setTimeout(resetTerminal, 2000);
        }

        function resetTerminal() {
            document.getElementById('success').classList.add('hidden');
            document.getElementById('payment').classList.add('hidden');
            document.getElementById('idle').classList.remove('hidden');
        }

        window.onload = () => {
            console.log("%cТерминал готов. Введите AID из index.html", "color:#22c55e");
        };
    </script>
</body>
</html>
