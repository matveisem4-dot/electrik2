<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МЕГА ПОС — ТЕРМИНАЛ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap');
        .terminal { background: linear-gradient(180deg, #052005, #021402); }
    </style>
</head>
<body class="bg-zinc-950 text-white">
    <div class="max-w-md mx-auto min-h-screen terminal flex flex-col">
        <div class="h-20 bg-emerald-600 flex items-center px-8 text-4xl font-bold text-black">МЕГА ПОС</div>
        
        <div class="flex-1 p-10 flex flex-col items-center justify-center text-center">
            <div id="connect-screen">
                <i class="fa-solid fa-mobile-screen-button text-8xl text-emerald-400 mb-10"></i>
                <h2 class="text-3xl font-bold mb-8">ТЕРМИНАЛ</h2>
                <input id="aid-input" type="text" maxlength="8" placeholder="Введите AID" 
                       class="w-full text-center text-5xl font-mono bg-black border border-emerald-500 rounded-3xl py-8 outline-none mb-8">
                <button onclick="connectTerminal()" 
                        class="w-full py-8 bg-emerald-500 text-black text-2xl font-bold rounded-3xl">ПОДКЛЮЧИТЬСЯ</button>
            </div>

            <div id="main-screen" class="hidden w-full text-center">
                <div class="text-emerald-400 text-sm tracking-widest mb-4">ПОДКЛЮЧЁН</div>
                <div id="aid-display" class="text-6xl font-mono text-emerald-400 mb-12"></div>
                
                <div id="waiting" class="text-xl">Ожидаем запрос от кассы...</div>
                
                <div id="payment-screen" class="hidden mt-12">
                    <div id="amount" class="text-7xl font-light text-white">890</div>
                    <div class="text-emerald-400">рублей</div>
                    <button onclick="confirmPayment()" 
                            class="mt-16 w-full py-12 bg-white text-black text-2xl font-bold rounded-3xl">ОПЛАТИТЬ МЕТКОЙ</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            databaseURL: "https://cassa-simulator-4-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentAID = "";

        function connectTerminal() {
            const input = document.getElementById('aid-input').value.trim().toUpperCase();
            if (!input) return alert("Введите AID из кассы");
            
            currentAID = input;
            document.getElementById('connect-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
            document.getElementById('aid-display').textContent = currentAID;

            // Реальное прослушивание Firebase
            db.ref('requests/' + currentAID).on('value', (snapshot) => {
                const data = snapshot.val();
                if (data && data.status === "pending") {
                    document.getElementById('waiting').classList.add('hidden');
                    document.getElementById('payment-screen').classList.remove('hidden');
                    document.getElementById('amount').textContent = data.amount;
                }
            });
        }

        function confirmPayment() {
            db.ref('requests/' + currentAID).once('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    db.ref('payments/' + Date.now()).set({
                        aid: currentAID,
                        amount: data.amount,
                        status: "success",
                        time: Date.now()
                    });
                    alert(`✅ Оплата ${data.amount} ₽ прошла успешно!`);
                    db.ref('requests/' + currentAID).remove();
                    document.getElementById('payment-screen').classList.add('hidden');
                    document.getElementById('waiting').classList.remove('hidden');
                }
            });
        }

        window.onload = () => {
            console.log("%cТерминал подключён к Firebase cassa-simulator-4", "color:#22c55e");
        };
    </script>
</body>
</html>
