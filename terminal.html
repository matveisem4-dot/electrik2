<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МЕГА ПОС — ТЕРМИНАЛ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap');
        .terminal { background: linear-gradient(180deg, #052005, #021402); }
        .glow { animation: glow 2s infinite alternate; }
        @keyframes glow { from { text-shadow: 0 0 20px #22c55e; } to { text-shadow: 0 0 45px #22c55e; } }
    </style>
</head>
<body class="bg-zinc-950 text-white">
    <div class="max-w-md mx-auto min-h-screen terminal flex flex-col border border-emerald-600">
        <div class="h-20 bg-emerald-600 flex items-center px-8 text-black text-4xl font-bold">МЕГА ПОС</div>
        
        <div class="flex-1 p-10 flex flex-col items-center justify-center text-center">
            <div id="connect-screen">
                <i class="fa-solid fa-mobile-screen-button text-8xl text-emerald-400 mb-10 glow"></i>
                <h2 class="text-3xl font-bold mb-8">ТЕРМИНАЛ</h2>
                <input id="aid-input" type="text" maxlength="8" placeholder="Введите AID от кассы" 
                       class="w-full text-center text-5xl font-mono bg-black border border-emerald-500 rounded-3xl py-8 outline-none mb-8">
                <button onclick="connectTerminal()" 
                        class="w-full py-8 bg-emerald-500 text-black text-2xl font-bold rounded-3xl">ПОДКЛЮЧИТЬСЯ</button>
            </div>

            <div id="main-screen" class="hidden w-full text-center">
                <div class="text-emerald-400 text-sm tracking-widest mb-6">ПОДКЛЮЧЁН</div>
                <div id="current-aid" class="text-6xl font-mono text-emerald-400 mb-12"></div>
                
                <div id="waiting" class="text-2xl font-medium text-emerald-300">Ожидаем запрос оплаты от кассы...</div>
                
                <div id="payment-screen" class="hidden mt-12">
                    <div class="text-emerald-400 text-sm mb-4">ЗАПРОС ОПЛАТЫ</div>
                    <div id="payment-amount" class="text-7xl font-light text-white">890</div>
                    <div class="text-zinc-400">рублей</div>
                    <button onclick="confirmPayment()" 
                            class="mt-16 w-full py-10 bg-white text-black text-2xl font-bold rounded-3xl">ПРИКЛАДЫВАЙ МЕТКУ</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentAID = "";

        function connectTerminal() {
            const input = document.getElementById('aid-input').value.trim().toUpperCase();
            if (!input) return alert("Введите AID из кассы");
            
            currentAID = input;
            document.getElementById('connect-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
            document.getElementById('current-aid').textContent = currentAID;
            
            setInterval(checkForRequest, 800);
        }

        function checkForRequest() {
            const req = JSON.parse(localStorage.getItem('pending_payment') || '{}');
            if (req.aid === currentAID && req.amount) {
                document.getElementById('waiting').classList.add('hidden');
                document.getElementById('payment-screen').classList.remove('hidden');
                document.getElementById('payment-amount').textContent = req.amount;
            }
        }

        function confirmPayment() {
            const req = JSON.parse(localStorage.getItem('pending_payment') || '{}');
            alert(`Оплата ${req.amount} ₽ прошла успешно!`);
            localStorage.removeItem('pending_payment');
            document.getElementById('payment-screen').classList.add('hidden');
            document.getElementById('waiting').classList.remove('hidden');
        }

        window.onload = () => {
            console.log("%cТерминал запущен. Введите AID из cashier.html", "color:#22c55e");
        };
    </script>
</body>
</html>
