<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МЕГА ПОС — ТЕРМИНАЛ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap');
        .terminal { background: radial-gradient(circle at center, #0a2a0a, #000); }
        .glow { animation: glow 2.5s infinite alternate; }
        @keyframes glow { from { text-shadow: 0 0 20px #22c55e; } to { text-shadow: 0 0 60px #22c55e; } }
    </style>
</head>
<body class="bg-black text-white">
    <div class="max-w-md mx-auto min-h-screen terminal flex flex-col">
        <div class="h-20 bg-gradient-to-r from-emerald-600 to-teal-500 flex items-center px-8 text-4xl font-bold text-black header">МЕГА ПОС</div>
        
        <div class="flex-1 flex flex-col items-center justify-center p-10 text-center">
            <div id="connect-screen">
                <div class="text-emerald-400 text-6xl mb-8 glow">📟</div>
                <h2 class="text-4xl font-bold mb-10">ТЕРМИНАЛ</h2>
                <input id="aid-input" type="text" maxlength="8" placeholder="AID от кассы" 
                       class="w-full text-center text-5xl font-mono bg-zinc-900 border border-emerald-500 rounded-3xl py-8 outline-none mb-10">
                <button onclick="connectTerminal()" 
                        class="w-full py-8 bg-emerald-500 hover:bg-emerald-400 text-black text-2xl font-bold rounded-3xl transition">
                    ПОДКЛЮЧИТЬСЯ
                </button>
            </div>

            <div id="main-screen" class="hidden w-full">
                <div class="text-emerald-400 text-sm tracking-widest mb-4">ПОДКЛЮЧЁН</div>
                <div id="aid-display" class="text-6xl font-mono text-emerald-400 mb-12 glow"></div>
                
                <div id="waiting-screen" class="text-xl text-emerald-300">Ожидаем запрос от кассы...</div>
                
                <div id="payment-screen" class="hidden">
                    <div class="text-7xl font-light text-white mb-6" id="pay-amount">890</div>
                    <div class="text-emerald-400 mb-12">к оплате</div>
                    <button onclick="simulateNFCPayment()" 
                            class="w-full py-12 bg-white text-black text-2xl font-bold rounded-3xl active:scale-95 transition">
                        ПРИКЛАДЫВАЙ МЕТКУ
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentAID = "";

        function connectTerminal() {
            const input = document.getElementById('aid-input').value.trim().toUpperCase();
            if (!input) return alert("Введите AID из кассы");
            
            currentAID = input;
            document.getElementById('connect-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
            document.getElementById('aid-display').textContent = currentAID;

            setInterval(checkForPayment, 800);
        }

        function checkForPayment() {
            const req = JSON.parse(localStorage.getItem('pending_payment') || '{}');
            if (req.aid === currentAID) {
                document.getElementById('waiting-screen').classList.add('hidden');
                document.getElementById('payment-screen').classList.remove('hidden');
                document.getElementById('pay-amount').textContent = req.amount;
            }
        }

        function simulateNFCPayment() {
            const req = JSON.parse(localStorage.getItem('pending_payment') || '{}');
            if (!req.amount) return;
            
            alert(`✅ Оплата ${req.amount} ₽ прошла успешно!\nМетка считана.`);
            localStorage.removeItem('pending_payment');
            document.getElementById('payment-screen').classList.add('hidden');
            document.getElementById('waiting-screen').classList.remove('hidden');
        }

        window.onload = () => {
            console.log("%cТерминал МЕГА ПОС готов. Дизайн улучшен, анимации добавлены.", "color:#22c55e");
        };
    </script>
</body>
</html>
