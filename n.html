<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МЕГА ПОС — КАССА</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .header { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-white">
    <div class="max-w-4xl mx-auto p-8">
        <div class="flex justify-between items-center mb-10">
            <div class="header text-5xl font-bold text-emerald-400 tracking-tighter">МЕГА ПОС</div>
            <div class="text-emerald-400">КАССА</div>
        </div>

        <button onclick="generateConnectionQR()" 
                class="w-full py-8 bg-emerald-500 text-black text-2xl font-bold rounded-3xl flex items-center justify-center gap-4 hover:scale-105 transition">
            <i class="fa-solid fa-qrcode text-3xl"></i>
            ПОДКЛЮЧИТЬ ТЕРМИНАЛ (ПОКАЗАТЬ QR)
        </button>

        <div id="qr-container" class="hidden mt-10 text-center">
            <p class="text-emerald-400 mb-4">Отсканируйте этот QR код на телефоне в terminal.html</p>
            <img id="qr-image" class="mx-auto rounded-2xl shadow-2xl">
            <p class="text-xs text-zinc-500 mt-6">Код подключения: <span id="room-code" class="font-mono text-emerald-400"></span></p>
        </div>

        <div class="mt-16">
            <h2 class="text-xl mb-4 text-emerald-400">Подключённые терминалы</h2>
            <div id="connected-terminals" class="space-y-3"></div>
        </div>
    </div>

    <script>
        let currentRoom = "";

        function generateConnectionQR() {
            currentRoom = "MP" + Math.floor(100000 + Math.random() * 900000);
            const url = `terminal.html?room=${currentRoom}`;
            document.getElementById('qr-image').src = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${encodeURIComponent(url)}`;
            document.getElementById('room-code').textContent = currentRoom;
            document.getElementById('qr-container').classList.remove('hidden');
            
            // Симуляция подключения терминала
            setTimeout(() => {
                addConnectedTerminal(currentRoom);
            }, 3000);
        }

        function addConnectedTerminal(room) {
            const div = document.createElement('div');
            div.className = "bg-zinc-900 rounded-3xl p-6 flex justify-between items-center";
            div.innerHTML = `
                <div>
                    <div class="text-emerald-400 font-mono">Терминал подключён</div>
                    <div class="text-sm text-zinc-400">Room: ${room}</div>
                </div>
                <button onclick="sendPaymentToTerminal('${room}')" 
                        class="bg-emerald-500 text-black px-8 py-4 rounded-3xl text-sm font-bold">Отправить оплату</button>
            `;
            document.getElementById('connected-terminals').appendChild(div);
        }

        function sendPaymentToTerminal(room) {
            const amount = prompt("Сумма оплаты:", "890");
            if (amount) {
                localStorage.setItem('payment_request', JSON.stringify({
                    room: room,
                    amount: parseInt(amount),
                    time: Date.now()
                }));
                alert(`Запрос на ${amount} ₽ отправлен на терминал ${room}`);
            }
        }

        window.onload = () => {
            console.log("%cМЕГА ПОС КАССА готова. Нажми кнопку чтобы сгенерировать QR для терминала на телефоне.", "color:#22c55e");
        };
    </script>
</body>
</html>
