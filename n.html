<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мега POS — Касса</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .header { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <div class="max-w-6xl mx-auto p-8">
        <div class="header text-6xl font-bold text-emerald-400 mb-1">МЕГА POS</div>
        <div class="text-emerald-400 mb-10">КАССА • УПРАВЛЕНИЕ</div>

        <div class="grid grid-cols-12 gap-8">
            <!-- Товары и корзина -->
            <div class="col-span-7 bg-zinc-900 rounded-3xl p-8">
                <h2 class="text-2xl font-semibold mb-6">Товары</h2>
                <div class="grid grid-cols-3 gap-4 mb-8" id="products"></div>
                
                <div class="bg-zinc-800 rounded-3xl p-6">
                    <h3 class="font-medium mb-4">Корзина</h3>
                    <div id="cart" class="min-h-[100px]"></div>
                    <div class="flex justify-between text-3xl font-light mt-6">
                        <div>Итого:</div>
                        <div id="total" class="text-emerald-400">0 ₽</div>
                    </div>
                    <button onclick="sendToTerminal()" 
                            class="mt-8 w-full py-6 bg-emerald-500 text-black font-bold text-xl rounded-3xl">
                        ОТПРАВИТЬ ЗАПРОС НА ТЕРМИНАЛ
                    </button>
                </div>
            </div>

            <!-- Метки -->
            <div class="col-span-5 bg-zinc-900 rounded-3xl p-8">
                <div class="flex justify-between mb-6">
                    <h2 class="text-2xl font-semibold">Метки</h2>
                    <button onclick="addNewTag()" class="bg-white text-black px-6 py-3 rounded-3xl text-sm flex items-center gap-2">
                        <i class="fa-solid fa-plus"></i> НОВАЯ МЕТКА
                    </button>
                </div>
                <div id="tags-list" class="space-y-4"></div>
            </div>
        </div>

        <div class="mt-12 bg-zinc-900 rounded-3xl p-8">
            <h3 class="font-semibold mb-6">История операций</h3>
            <div id="history" class="space-y-4 max-h-80 overflow-auto"></div>
        </div>
    </div>

    <script>
        let tags = JSON.parse(localStorage.getItem('tags')) || [];
        let cart = [];
        let products = [
            {name:"Кола 0.5", price:89},
            {name:"Шаурма", price:290},
            {name:"Кофе", price:150},
            {name:"Чипсы", price:120},
            {name:"Энергетик", price:110}
        ];
        let history = [];

        function save() { localStorage.setItem('tags', JSON.stringify(tags)); }

        function addHistory(text) {
            history.unshift({time: new Date().toLocaleTimeString('ru-RU'), text});
            renderHistory();
        }

        function renderTags() {
            const container = document.getElementById('tags-list');
            container.innerHTML = tags.map((tag,i) => `
                <div class="bg-zinc-800 rounded-3xl p-6 flex justify-between items-center border ${tag.blocked?'border-red-500':'border-emerald-500'}">
                    <div>
                        <div class="font-mono text-emerald-400">${tag.aid}</div>
                        <div>${tag.owner}</div>
                    </div>
                    <div class="text-right">
                        <div class="text-3xl font-light">${tag.balance} ₽</div>
                        <div class="flex gap-3 mt-4">
                            <button onclick="toggleBlock(${i});event.stopImmediatePropagation()" class="text-xs px-5 py-2 border rounded-2xl">${tag.blocked?'Разблокировать':'Заблокировать'}</button>
                            <button onclick="deleteTag(${i});event.stopImmediatePropagation()" class="text-xs px-5 py-2 bg-red-900 rounded-2xl">Удалить</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderProducts() {
            const container = document.getElementById('products');
            container.innerHTML = products.map((p,i) => `
                <div onclick="addToCart(${i})" class="bg-zinc-800 hover:bg-zinc-700 p-6 rounded-3xl cursor-pointer text-center">
                    <div class="font-medium">${p.name}</div>
                    <div class="text-emerald-400 text-2xl font-light">${p.price} ₽</div>
                </div>
            `).join('');
        }

        function renderCart() {
            const container = document.getElementById('cart');
            container.innerHTML = cart.map((item,i) => `
                <div class="flex justify-between py-2">
                    <div>${item.name}</div>
                    <div>${item.price} ₽</div>
                </div>
            `).join('');
            const total = cart.reduce((sum,item)=>sum+item.price,0);
            document.getElementById('total').textContent = total + " ₽";
        }

        function addToCart(i) {
            cart.push(products[i]);
            renderCart();
        }

        function sendToTerminal() {
            const total = cart.reduce((sum,item)=>sum+item.price,0);
            if (total === 0) return alert("Корзина пуста");
            
            const aid = prompt("Введите AID терминала (из терминала на телефоне):", "KX9P2M");
            if (!aid) return;
            
            localStorage.setItem("pending_payment", JSON.stringify({
                aid: aid.toUpperCase(),
                amount: total,
                items: cart.map(c=>c.name).join(", ")
            }));
            
            addHistory(`Запрос на ${total} ₽ отправлен на терминал ${aid}`);
            alert(`Запрос отправлен на терминал ${aid}\nСумма: ${total} ₽`);
            cart = [];
            renderCart();
        }

        function addNewTag() {
            const owner = prompt("Имя владельца:", "Клиент");
            if (!owner) return;
            const aid = "MP" + Math.floor(100000 + Math.random()*900000);
            tags.unshift({aid, owner, balance: 5000, blocked: false, nfcId: "04XX"});
            save();
            renderTags();
            addHistory(`Новая метка добавлена • ${aid}`);
        }

        function toggleBlock(i) {
            tags[i].blocked = !tags[i].blocked;
            save();
            renderTags();
        }

        function deleteTag(i) {
            if (confirm("Удалить метку?")) {
                tags.splice(i,1);
                save();
                renderTags();
            }
        }

        function renderHistory() {
            const container = document.getElementById('history');
            container.innerHTML = history.map(h => `
                <div class="flex gap-6 bg-zinc-800 p-5 rounded-2xl">
                    <div class="font-mono text-emerald-400 w-20">${h.time}</div>
                    <div>${h.text}</div>
                </div>
            `).join('');
        }

        window.onload = () => {
            if (tags.length === 0) {
                tags = [
                    {aid:"KX9P2M", owner:"Алексей Иванов", balance:12480, blocked:false},
                    {aid:"Q7W8V1", owner:"Мария Петрова", balance:3420, blocked:false}
                ];
            }
            renderTags();
            renderProducts();
            renderHistory();
        };
    </script>
</body>
</html>
