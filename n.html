<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Касса • NFC Управление</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        .tag-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .tag-card:hover { transform: translateY(-8px); box-shadow: 0 25px 50px -12px rgb(16 185 129); }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <div class="flex h-screen">
        <!-- SIDEBAR -->
        <div class="w-72 bg-zinc-900 p-6 flex flex-col border-r border-zinc-700">
            <div class="flex items-center gap-3 mb-12">
                <div class="text-4xl font-bold tracking-tighter text-emerald-400">POS</div>
                <div class="text-xs bg-emerald-900 px-3 py-1 rounded-3xl">КАССА</div>
            </div>
            <div onclick="switchTab(0)" id="tab0" class="flex items-center gap-3 px-6 py-4 rounded-3xl cursor-pointer bg-emerald-900 text-white mb-2">📊 Обзор</div>
            <div onclick="switchTab(1)" id="tab1" class="flex items-center gap-3 px-6 py-4 rounded-3xl cursor-pointer">🏷️ Метки</div>
            <div onclick="switchTab(2)" id="tab2" class="flex items-center gap-3 px-6 py-4 rounded-3xl cursor-pointer">📟 Терминалы</div>
            <div onclick="switchTab(3)" id="tab3" class="flex items-center gap-3 px-6 py-4 rounded-3xl cursor-pointer">📜 История</div>
        </div>

        <div class="flex-1 overflow-auto p-10">
            <!-- TAB 0: OVERVIEW -->
            <div id="content-0">
                <h1 class="text-6xl font-bold tracking-tighter">Касса NFC</h1>
                <p class="text-emerald-400">Управление метками, терминалами и реальными платежами</p>
                <div class="mt-12 grid grid-cols-3 gap-6" id="overview-cards"></div>
            </div>

            <!-- TAB 1: TAGS -->
            <div id="content-1" class="hidden">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-4xl font-bold">Метки и карты</h2>
                    <button onclick="createNewTag()" class="bg-emerald-500 text-black px-8 py-4 rounded-3xl font-semibold flex items-center gap-3">
                        <i class="fa-solid fa-plus"></i> НОВАЯ МЕТКА
                    </button>
                </div>
                <div id="tags-grid" class="grid grid-cols-3 gap-6"></div>
            </div>

            <!-- TAB 2: TERMINALS -->
            <div id="content-2" class="hidden">
                <h2 class="text-4xl font-bold mb-8">Терминалы</h2>
                <div id="terminals-list" class="grid grid-cols-2 gap-6"></div>
            </div>

            <!-- TAB 3: HISTORY -->
            <div id="content-3" class="hidden">
                <h2 class="text-4xl font-bold mb-8">История операций</h2>
                <div id="history-list" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script>
        let tags = JSON.parse(localStorage.getItem('nfc_tags_v2')) || [];
        let terminals = JSON.parse(localStorage.getItem('nfc_terminals')) || [
            {id:1, name:"Терминал 01", aid:"A0000000031010", qr:"https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=A0000000031010"},
            {id:2, name:"Терминал 02", aid:"B0000000042020", qr:"https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=B0000000042020"}
        ];
        let history = [];

        const channel = new BroadcastChannel('nfc-pos-channel');

        function saveData() {
            localStorage.setItem('nfc_tags_v2', JSON.stringify(tags));
            localStorage.setItem('nfc_terminals', JSON.stringify(terminals));
        }

        function addHistory(action, detail) {
            history.unshift({time: new Date().toLocaleTimeString('ru-RU'), action, detail});
            renderHistory();
        }

        function renderAll() {
            renderTags();
            renderTerminals();
            renderOverview();
            renderHistory();
        }

        function createNewTag() {
            const owner = prompt("Имя владельца:", "Клиент " + (tags.length+1));
            const nfcId = "04" + Math.random().toString(16).slice(2,14).toUpperCase();
            const aid = "A" + Math.random().toString(16).slice(2,16).toUpperCase();
            
            tags.unshift({
                nfcId: nfcId,
                aid: aid,
                owner: owner,
                balance: 1500,
                status: "active",
                qr: `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${aid}`
            });
            saveData();
            renderAll();
            addHistory("Новая метка", owner);
            channel.postMessage({type:"NEW_TAG", tag: tags[0]});
        }

        function toggleBlock(index) {
            tags[index].status = tags[index].status === "active" ? "blocked" : "active";
            saveData();
            renderAll();
            addHistory(tags[index].status === "blocked" ? "Метка заблокирована" : "Метка разблокирована", tags[index].owner);
        }

        function deleteTag(index) {
            if (confirm("Удалить метку полностью?")) {
                const name = tags[index].owner;
                tags.splice(index,1);
                saveData();
                renderAll();
                addHistory("Метка удалена", name);
            }
        }

        function sendPaymentToTerminal(termIndex) {
            const amount = parseInt(prompt("Сумма к оплате:", "750")) || 750;
            const term = terminals[termIndex];
            
            channel.postMessage({
                type: "PAYMENT_REQUEST",
                amount: amount,
                terminalId: term.id,
                terminalName: term.name,
                aid: term.aid,
                qr: term.qr
            });
            
            addHistory("Запрос оплаты отправлен", `${term.name} — ${amount} ₽`);
            alert(`Запрос на ${amount} ₽ отправлен на ${term.name}\n\nОткройте terminal.html`);
        }

        function renderTags() {
            const container = document.getElementById('tags-grid');
            container.innerHTML = tags.map((tag,i) => `
                <div class="tag-card bg-zinc-900 rounded-3xl p-6 border ${tag.status==='blocked'?'border-red-500':'border-emerald-500'}">
                    <div class="flex justify-between">
                        <div class="font-mono text-lg">${tag.nfcId}</div>
                        <div class="text-xs px-4 py-1 rounded-3xl ${tag.status==='active'?'bg-emerald-900 text-emerald-400':'bg-red-900 text-red-400'}">${tag.status.toUpperCase()}</div>
                    </div>
                    <div class="mt-6 text-3xl font-light">${tag.balance} ₽</div>
                    <div class="text-sm text-zinc-400">${tag.owner}</div>
                    <div class="text-[10px] font-mono text-amber-400 mt-4">${tag.aid}</div>
                    <div class="flex gap-3 mt-8">
                        <button onclick="toggleBlock(${i});event.stopImmediatePropagation()" class="flex-1 py-3 text-xs border border-zinc-600 rounded-2xl">${tag.status==='active'?'Заблокировать':'Разблокировать'}</button>
                        <button onclick="deleteTag(${i});event.stopImmediatePropagation()" class="flex-1 py-3 text-xs bg-red-900 hover:bg-red-800 rounded-2xl">Удалить</button>
                    </div>
                </div>
            `).join('');
        }

        function renderTerminals() {
            const container = document.getElementById('terminals-list');
            container.innerHTML = terminals.map((t,i) => `
                <div class="bg-zinc-900 rounded-3xl p-8 border border-emerald-800">
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="text-2xl font-semibold">${t.name}</div>
                            <div class="font-mono text-emerald-400 text-sm mt-1">${t.aid}</div>
                        </div>
                        <img src="${t.qr}" class="w-20 h-20 rounded-2xl">
                    </div>
                    <button onclick="sendPaymentToTerminal(${i})" 
                            class="mt-10 w-full py-6 bg-white text-black font-bold rounded-3xl text-sm tracking-widest">ОТПРАВИТЬ ЗАПРОС ОПЛАТЫ НА ЭТОТ ТЕРМИНАЛ</button>
                </div>
            `).join('');
        }

        function renderOverview() {
            // Simple stats
            document.getElementById('overview-cards').innerHTML = `
                <div class="bg-zinc-900 rounded-3xl p-8">
                    <div class="text-emerald-400 text-sm">АКТИВНЫХ МЕТОК</div>
                    <div class="text-7xl font-light mt-4">${tags.filter(t=>t.status==='active').length}</div>
                </div>
                <div class="bg-zinc-900 rounded-3xl p-8">
                    <div class="text-emerald-400 text-sm">ОБЩИЙ БАЛАНС</div>
                    <div class="text-7xl font-light mt-4">${tags.reduce((a,t)=>a+t.balance,0)} ₽</div>
                </div>
                <div class="bg-zinc-900 rounded-3xl p-8">
                    <div class="text-emerald-400 text-sm">ТЕРМИНАЛОВ</div>
                    <div class="text-7xl font-light mt-4">${terminals.length}</div>
                </div>
            `;
        }

        function renderHistory() {
            document.getElementById('history-list').innerHTML = history.map(h => `
                <div class="bg-zinc-900 p-6 rounded-3xl flex gap-6">
                    <div class="font-mono text-xs text-emerald-400 w-20">${h.time}</div>
                    <div class="flex-1">${h.action}<div class="text-xs text-zinc-500">${h.detail}</div></div>
                </div>
            `).join('');
        }

        function switchTab(n) {
            for (let i = 0; i < 4; i++) {
                const el = document.getElementById('content-' + i);
                const tab = document.getElementById('tab' + i);
                if (el) el.classList.toggle('hidden', i !== n);
                if (tab) tab.classList.toggle('bg-emerald-900', i === n);
            }
        }

        channel.onmessage = (e) => {
            if (e.data.type === "PAYMENT_SUCCESS") {
                addHistory("Оплата прошла", `${e.data.owner || ''} — ${e.data.amount} ₽`);
                // Update balance
                const tag = tags.find(t => t.aid === e.data.aid);
                if (tag) {
                    tag.balance = Math.max(0, tag.balance - e.data.amount);
                    saveData();
                    renderAll();
                }
            }
        };

        window.onload = () => {
            if (tags.length === 0) {
                tags = [
                    {nfcId:"04A1B2C3D4E5", aid:"A0000000031010", balance:3240, owner:"Алексей Иванов", status:"active"},
                    {nfcId:"04F7A9B2C318", aid:"B0000000042020", balance:870, owner:"Мария Петрова", status:"active"}
                ];
                saveData();
            }
            renderAll();
            switchTab(0);
        };
    </script>
</body>
</html>
