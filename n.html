<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC POS • Управление (с балансом)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        .tag { transition: all 0.2s cubic-bezier(0.4,0,0.2,1); }
        .tag:hover { transform: scale(1.03); }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <div class="flex h-screen">
        <div class="w-72 bg-zinc-900 border-r border-zinc-700 p-6 flex flex-col">
            <div class="flex items-center gap-3 mb-10">
                <div class="w-10 h-10 bg-emerald-500 rounded-2xl flex items-center justify-center text-3xl">📟</div>
                <div class="text-3xl font-bold tracking-tighter">NFC POS</div>
            </div>
            <div onclick="switchTab(0)" id="tab-0" class="tab flex items-center gap-3 px-6 py-4 rounded-2xl mb-1 cursor-pointer bg-emerald-900 text-white">📊 Дашборд</div>
            <div onclick="switchTab(1)" id="tab-1" class="tab flex items-center gap-3 px-6 py-4 rounded-2xl mb-1 cursor-pointer">🏷️ Метки & AID</div>
            <div onclick="switchTab(2)" id="tab-2" class="tab flex items-center gap-3 px-6 py-4 rounded-2xl cursor-pointer">📜 Журнал</div>
        </div>
        
        <div class="flex-1 p-10 overflow-auto">
            <!-- Tab 0 -->
            <div id="tab-content-0">
                <h1 class="text-5xl font-bold tracking-tighter mb-2">Управление NFC-метками</h1>
                <p class="text-emerald-400">Реальное чтение + привязка AID + пополнение баланса</p>
                
                <div class="mt-12 grid grid-cols-2 gap-8">
                    <div>
                        <div class="text-sm text-zinc-400 mb-4">ПРИВЯЗАННЫЕ МЕТКИ (NFC ID → AID)</div>
                        <div id="tags-list" class="space-y-4"></div>
                    </div>
                    <div>
                        <button onclick="addNewTagManually()" 
                                class="bg-white text-black px-8 py-4 rounded-3xl flex items-center gap-3 font-medium">
                            <i class="fa-solid fa-plus"></i> ДОБАВИТЬ МЕТКУ ВРУЧНУЮ
                        </button>
                        <div class="mt-8 bg-zinc-900 rounded-3xl p-8">
                            <div class="text-emerald-400 text-sm mb-4">ПОПОЛНИТЬ БАЛАНС</div>
                            <select id="select-tag" class="w-full bg-zinc-800 rounded-2xl p-4 mb-4"></select>
                            <input id="add-amount" type="number" placeholder="Сумма пополнения" value="500" 
                                   class="w-full bg-zinc-800 rounded-2xl p-4 mb-6 text-3xl font-light">
                            <button onclick="topUpBalance()" 
                                    class="w-full py-5 bg-emerald-500 text-black font-semibold rounded-3xl">ПОПОЛНИТЬ БАЛАНС</button>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Tab 1: Метки -->
            <div id="tab-content-1" class="hidden">
                <h2 class="text-4xl font-bold mb-8">Все привязанные метки</h2>
                <div id="full-tags-table" class="bg-zinc-900 rounded-3xl overflow-hidden"></div>
            </div>
            
            <!-- Tab 2: Logs -->
            <div id="tab-content-2" class="hidden">
                <h2 class="text-4xl font-bold mb-8">Журнал операций</h2>
                <div id="logs-list" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script>
        let tags = JSON.parse(localStorage.getItem('nfc_tags')) || [
            { nfcId: "04A1B2C3D4E5", aid: "A0000000031010", balance: 2450, owner: "Алексей Иванов" },
            { nfcId: "04F7A9B2C318", aid: "B0000000042020", balance: 870, owner: "Мария Петрова" }
        ];
        
        let logs = [];
        
        const channel = new BroadcastChannel('nfc-pos-channel');
        
        function saveTags() {
            localStorage.setItem('nfc_tags', JSON.stringify(tags));
        }
        
        function addLog(message, detail) {
            logs.unshift({ time: new Date().toLocaleTimeString('ru-RU'), message, detail });
            if (logs.length > 30) logs.pop();
            renderLogs();
        }
        
        function renderTags() {
            const list = document.getElementById('tags-list');
            const table = document.getElementById('full-tags-table');
            const select = document.getElementById('select-tag');
            
            list.innerHTML = tags.map((tag,i) => `
                <div onclick="selectTag(${i})" class="tag bg-zinc-900 border border-zinc-700 hover:border-emerald-500 p-6 rounded-3xl cursor-pointer flex justify-between items-center">
                    <div>
                        <div class="font-mono text-emerald-400">${tag.nfcId}</div>
                        <div class="text-xs text-zinc-500 mt-1">${tag.owner}</div>
                    </div>
                    <div class="text-right">
                        <div class="text-3xl font-light text-emerald-400">${tag.balance} ₽</div>
                        <div class="text-[10px] font-mono text-amber-400">${tag.aid}</div>
                    </div>
                </div>
            `).join('');
            
            let tableHTML = `<table class="w-full"><thead class="bg-black"><tr><th class="text-left p-6">NFC ID</th><th class="text-left p-6">AID</th><th class="text-left p-6">Владелец</th><th class="text-right p-6">Баланс</th></tr></thead><tbody>`;
            tags.forEach(tag => {
                tableHTML += `<tr class="border-t border-zinc-800"><td class="p-6 font-mono">${tag.nfcId}</td><td class="p-6 font-mono text-amber-400">${tag.aid}</td><td class="p-6">${tag.owner}</td><td class="p-6 text-right font-semibold">${tag.balance} ₽</td></tr>`;
            });
            tableHTML += `</tbody></table>`;
            table.innerHTML = tableHTML;
            
            select.innerHTML = tags.map((tag,i) => `<option value="${i}">${tag.owner} — ${tag.nfcId}</option>`).join('');
        }
        
        function renderLogs() {
            document.getElementById('logs-list').innerHTML = logs.map(l => `
                <div class="bg-zinc-900 px-8 py-5 rounded-3xl flex gap-8 text-sm">
                    <div class="font-mono w-20 text-emerald-400">${l.time}</div>
                    <div class="flex-1">${l.message}<div class="text-xs text-zinc-500 mt-1">${l.detail}</div></div>
                </div>
            `).join('');
        }
        
        function switchTab(n) {
            for (let i = 0; i < 3; i++) {
                const content = document.getElementById('tab-content-' + i);
                const tab = document.getElementById('tab-' + i);
                if (content) content.classList.toggle('hidden', i !== n);
                if (tab) tab.classList.toggle('bg-emerald-900', i === n);
            }
        }
        
        function addNewTagManually() {
            const nfcId = prompt("NFC ID метки (например 04A1B2C3D4E5):", "04" + Math.random().toString(16).slice(2,14).toUpperCase());
            const owner = prompt("Имя владельца:", "Новый пользователь");
            if (!nfcId) return;
            
            const newTag = {
                nfcId: nfcId.toUpperCase(),
                aid: "A" + Math.floor(Math.random()*99999999999999).toString(16).toUpperCase().padStart(15,'0'),
                balance: 500,
                owner: owner
            };
            tags.unshift(newTag);
            saveTags();
            renderTags();
            addLog("Новая метка добавлена вручную", nfcId);
        }
        
        function topUpBalance() {
            const index = document.getElementById('select-tag').value;
            const amount = parseInt(document.getElementById('add-amount').value) || 500;
            tags[index].balance += amount;
            saveTags();
            renderTags();
            addLog("Баланс пополнен", `${tags[index].owner} +${amount} ₽ (всего ${tags[index].balance})`);
        }
        
        function selectTag(i) {
            const tag = tags[i];
            if (confirm(`Пополнить баланс для ${tag.owner} (${tag.nfcId})?`)) {
                const amt = prompt("Сумма пополнения:", "1000");
                if (amt) {
                    tag.balance += parseInt(amt);
                    saveTags();
                    renderTags();
                    addLog("Пополнение", `${tag.owner} +${amt} ₽`);
                }
            }
        }
        
        channel.onmessage = (e) => {
            const data = e.data;
            if (data.type === 'REAL_NFC_READ') {
                const existing = tags.find(t => t.nfcId === data.id || t.nfcId.includes(data.id.slice(0,8)));
                if (existing) {
                    addLog("Метка распознана", `${existing.owner} (${existing.aid})`);
                    // Send current balance to terminal
                    channel.postMessage({
                        type: 'TAG_INFO',
                        nfcId: existing.nfcId,
                        aid: existing.aid,
                        balance: existing.balance,
                        owner: existing.owner
                    });
                } else {
                    // Auto register new tag
                    const newTag = {
                        nfcId: data.id.slice(0,14),
                        aid: "A" + Math.floor(Math.random()*99999999999999).toString(16).toUpperCase().padStart(15,'0'),
                        balance: 1000,
                        owner: "Новый пользователь"
                    };
                    tags.unshift(newTag);
                    saveTags();
                    renderTags();
                    addLog("Новая метка автоматически привязана", newTag.nfcId + " → " + newTag.aid);
                    channel.postMessage({ type: 'TAG_INFO', ...newTag });
                }
            }
            if (data.type === 'PAYMENT_SUCCESS') {
                const tag = tags.find(t => t.aid === data.aid || t.nfcId === data.id);
                if (tag && data.amount) {
                    tag.balance = Math.max(0, tag.balance - data.amount);
                    saveTags();
                    renderTags();
                    addLog("Списание", `${tag.owner} -${data.amount} ₽ (остаток ${tag.balance})`);
                }
            }
        };
        
        window.onload = () => {
            renderTags();
            renderLogs();
            switchTab(0);
            console.log("%cСистема готова. Прикладывайте реальную NFC-метку в терминале — она автоматически получит AID и баланс.", "color:#22c55e");
        };
    </script>
</body>
</html>
