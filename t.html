<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сбер Терминал</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        .screen { background: radial-gradient(circle at center, #0a1f0a, #000); }
    </style>
</head>
<body class="bg-black text-white">
    <div class="max-w-md mx-auto min-h-screen flex flex-col border-x border-emerald-600 overflow-hidden">
        <div class="bg-gradient-to-r from-emerald-600 to-teal-500 h-20 flex items-center px-8 text-3xl font-bold tracking-tighter">СБЕР</div>
        
        <div id="main" class="screen flex-1 flex flex-col p-8 relative">
            <div id="waiting-for-request" class="flex-1 flex flex-col items-center justify-center text-center">
                <div class="text-emerald-400 text-sm tracking-[3px] mb-6">ОЖИДАНИЕ ЗАПРОСА ОТ КАССЫ</div>
                <div class="w-40 h-40 border-8 border-emerald-400/30 rounded-3xl flex items-center justify-center">
                    <i class="fa-solid fa-qrcode text-8xl text-emerald-400/30"></i>
                </div>
                <div class="mt-12 text-xs text-emerald-300">Откройте кассу (admin.html) и отправьте запрос</div>
            </div>

            <div id="payment-request" class="hidden flex-1 flex flex-col">
                <div class="text-center">
                    <div class="text-7xl font-light text-white" id="req-amount">890</div>
                    <div class="text-emerald-400 text-sm">к оплате</div>
                </div>
                <div class="mt-auto">
                    <img id="terminal-qr" class="mx-auto rounded-3xl shadow-2xl" width="220">
                    <div class="text-center text-xs text-emerald-400 mt-6">Приложите метку к терминалу</div>
                </div>
                <button onclick="startReading()" 
                        class="mt-12 bg-white text-black py-6 rounded-3xl font-semibold text-lg">ПРИКЛАДЫВАЙ МЕТКУ</button>
            </div>

            <div id="success-screen" class="hidden flex-1 flex flex-col items-center justify-center">
                <i class="fa-solid fa-check-circle text-[140px] text-emerald-400"></i>
                <div class="text-5xl font-light mt-8" id="success-amt">890 ₽</div>
                <div class="text-emerald-400">ОПЛАТА ПРОШЛА</div>
                <button onclick="resetTerminal()" class="mt-20 px-16 py-5 border border-emerald-400 rounded-3xl text-sm">НОВАЯ ОПЕРАЦИЯ</button>
            </div>
        </div>
        
        <div class="h-12 bg-zinc-900 text-[10px] font-mono flex items-center justify-center text-emerald-400" id="aid-bar">AID: A0000000031010</div>
    </div>

    <script>
        let currentRequest = null;
        const channel = new BroadcastChannel('nfc-pos-channel');
        
        channel.onmessage = (e) => {
            const data = e.data;
            if (data.type === "PAYMENT_REQUEST") {
                currentRequest = data;
                document.getElementById('waiting-for-request').classList.add('hidden');
                const reqScreen = document.getElementById('payment-request');
                reqScreen.classList.remove('hidden');
                document.getElementById('req-amount').textContent = data.amount;
                document.getElementById('terminal-qr').src = data.qr || `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${data.aid}`;
                document.getElementById('aid-bar').textContent = "AID: " + data.aid;
            }
        };
        
        function startReading() {
            document.getElementById('payment-request').classList.add('hidden');
            // Simulate real read
            setTimeout(() => {
                const success = document.getElementById('success-screen');
                success.classList.remove('hidden');
                document.getElementById('success-amt').textContent = currentRequest.amount + " ₽";
                
                channel.postMessage({
                    type: "PAYMENT_SUCCESS",
                    amount: currentRequest.amount,
                    aid: currentRequest.aid,
                    owner: "Клиент"
                });
            }, 1100);
        }
        
        function resetTerminal() {
            document.getElementById('success-screen').classList.add('hidden');
            document.getElementById('waiting-for-request').classList.remove('hidden');
        }
        
        window.onload = () => {
            console.log("%cТерминал улучшен. Ждёт запрос именно от кассы (admin.html).", "color:#4ade80;font-size:14px");
        };
    </script>
</body>
</html>
