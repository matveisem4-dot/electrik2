<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сбер • NFC Терминал (реальное списание)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        .screen { background: linear-gradient(to bottom, #0a1a0a, #0f1f0f); }
    </style>
</head>
<body class="bg-zinc-950">
    <div class="max-w-md mx-auto bg-black min-h-screen flex flex-col border-x border-emerald-700">
        <div class="h-16 bg-emerald-600 text-black flex items-center px-6 font-bold text-2xl tracking-tighter">
            СБЕР <span class="text-xs ml-3 bg-black/30 px-3 py-1 rounded-3xl text-sm font-mono">NFC</span>
        </div>
        
        <div class="flex-1 screen p-8 flex flex-col" id="main">
            <!-- Waiting for purchase mode -->
            <div id="wait-mode" class="flex-1 flex flex-col items-center justify-center text-center">
                <div class="text-emerald-400 text-sm tracking-widest mb-6">РЕЖИМ ОЖИДАНИЯ ОПЛАТЫ</div>
                <div onclick="setPurchaseAmount()" class="cursor-pointer border-2 border-dashed border-emerald-400 w-64 h-64 rounded-3xl flex items-center justify-center hover:border-emerald-300 transition-all">
                    <div>
                        <i class="fa-solid fa-hand-holding-dollar text-6xl text-emerald-300"></i>
                        <div class="mt-8 text-emerald-400">УСТАНОВИТЬ СУММУ</div>
                    </div>
                </div>
                <div id="current-amount-display" class="mt-8 text-5xl font-light text-white">0 ₽</div>
                <button onclick="startNFCRead()" 
                        class="mt-12 bg-emerald-500 hover:bg-emerald-400 active:bg-white active:text-black transition-all text-black font-semibold px-16 py-6 rounded-3xl text-lg">
                    ПРИКЛАДЫВАЙ МЕТКУ
                </button>
            </div>
            
            <!-- Reading -->
            <div id="reading-mode" class="hidden flex-1 flex flex-col items-center justify-center">
                <div class="w-20 h-20 border-4 border-emerald-400 border-t-transparent animate-spin rounded-full mb-10"></div>
                <div class="text-2xl text-emerald-300">Ожидаем метку...</div>
                <div class="text-xs text-zinc-500 mt-12">Приложите NFC-метку к телефону</div>
            </div>
            
            <!-- Success -->
            <div id="success-mode" class="hidden flex-1 flex flex-col items-center justify-center text-center">
                <i class="fa-solid fa-circle-check text-[120px] text-emerald-400 mb-6"></i>
                <div class="text-4xl font-light" id="success-amount">890 ₽</div>
                <div class="text-emerald-400 mt-2">Списано успешно</div>
                <div id="success-owner" class="mt-8 text-sm text-zinc-400"></div>
                <button onclick="resetToWait()" class="mt-16 px-12 py-4 border border-emerald-400 text-emerald-400 rounded-3xl text-sm">НОВАЯ ПОКУПКА</button>
            </div>
            
            <!-- Insufficient funds -->
            <div id="fail-mode" class="hidden flex-1 flex flex-col items-center justify-center text-center">
                <i class="fa-solid fa-circle-xmark text-[110px] text-red-500 mb-8"></i>
                <div class="text-2xl text-red-400">Недостаточно средств</div>
                <button onclick="resetToWait()" class="mt-20 px-10 py-4 bg-zinc-800 rounded-3xl">ПОВТОРИТЬ</button>
            </div>
        </div>
        
        <div class="h-14 bg-zinc-900 flex items-center text-xs px-6 border-t border-emerald-900 font-mono text-emerald-400" id="status-bar">
            AID: A0000000031010 • Ожидание
        </div>
    </div>

    <script>
        let currentAmount = 0;
        let currentAID = "A0000000031010";
        let currentTag = null;
        
        const channel = new BroadcastChannel('nfc-pos-channel');
        
        function setPurchaseAmount() {
            const amt = prompt("Сумма покупки (руб):", "890");
            if (amt && !isNaN(parseInt(amt))) {
                currentAmount = parseInt(amt);
                document.getElementById('current-amount-display').textContent = currentAmount + " ₽";
            }
        }
        
        async function startNFCRead() {
            if (currentAmount <= 0) {
                alert("Сначала установите сумму покупки");
                return;
            }
            
            document.getElementById('wait-mode').classList.add('hidden');
            document.getElementById('reading-mode').classList.remove('hidden');
            
            if ('NDEFReader' in window) {
                try {
                    const ndef = new NDEFReader();
                    await ndef.scan();
                    
                    ndef.onreading = async (event) => {
                        let nfcId = "UNKNOWN";
                        if (event.message.records && event.message.records.length > 0) {
                            const record = event.message.records[0];
                            if (record.recordType === "text") {
                                nfcId = new TextDecoder().decode(record.data);
                            } else if (record.data) {
                                nfcId = Array.prototype.map.call(new Uint8Array(record.data), x => ('0' + x.toString(16)).slice(-2)).join('').toUpperCase();
                            }
                        }
                        
                        document.getElementById('reading-mode').classList.add('hidden');
                        channel.postMessage({ type: 'REAL_NFC_READ', id: nfcId, aid: currentAID });
                    };
                } catch(e) {
                    console.error(e);
                    fallbackSimulateRead();
                }
            } else {
                fallbackSimulateRead();
            }
        }
        
        function fallbackSimulateRead() {
            setTimeout(() => {
                const fakeId = "04" + Math.floor(100000000 + Math.random() * 900000000).toString(16).toUpperCase();
                document.getElementById('reading-mode').classList.add('hidden');
                channel.postMessage({ type: 'REAL_NFC_READ', id: fakeId, aid: currentAID, simulated: true });
            }, 1200);
        }
        
        channel.onmessage = (e) => {
            const msg = e.data;
            if (msg.type === 'TAG_INFO') {
                currentTag = msg;
                document.getElementById('status-bar').innerHTML = `Метка: ${msg.owner} • Баланс: ${msg.balance} ₽`;
                
                if (msg.balance >= currentAmount) {
                    // Success
                    document.getElementById('success-mode').classList.remove('hidden');
                    document.getElementById('success-amount').textContent = currentAmount + " ₽";
                    document.getElementById('success-owner').textContent = msg.owner || "Клиент";
                    
                    channel.postMessage({
                        type: 'PAYMENT_SUCCESS',
                        amount: currentAmount,
                        aid: msg.aid,
                        owner: msg.owner,
                        nfcId: msg.nfcId
                    });
                } else {
                    document.getElementById('fail-mode').classList.remove('hidden');
                }
            }
        };
        
        function resetToWait() {
            document.getElementById('success-mode').classList.add('hidden');
            document.getElementById('fail-mode').classList.add('hidden');
            document.getElementById('wait-mode').classList.remove('hidden');
            document.getElementById('status-bar').innerHTML = `AID: ${currentAID} • Ожидание`;
        }
        
        window.onload = () => {
            document.getElementById('status-bar').textContent = `AID: ${currentAID} • Готов к покупке`;
            console.log("%cТерминал в режиме ожидания оплаты. Прикладывайте метку после установки суммы.", "color:#4ade80");
        };
    </script>
</body>
</html>
