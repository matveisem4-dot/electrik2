<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сбер • NFC Терминал (Web NFC)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        .terminal-screen { background: linear-gradient(180deg, #0a120a, #111b11); }
    </style>
</head>
<body class="bg-zinc-950 text-white">
    <div class="max-w-md mx-auto min-h-screen bg-black border-x border-emerald-900 flex flex-col">
        <div class="bg-emerald-600 text-black h-14 flex items-center px-6 font-semibold">
            <div class="flex-1 flex items-center gap-2">
                <span class="text-3xl tracking-[-3px]">СБЕР</span>
            </div>
            <div id="aid-display" class="text-xs bg-black/30 px-4 py-1 rounded-3xl font-mono"></div>
        </div>

        <div id="main-screen" class="flex-1 flex flex-col p-8 terminal-screen">
            <div id="status" class="text-center text-emerald-400 text-xs mb-6">ГОТОВ К ЧТЕНИЮ NFC</div>
            
            <div id="idle" class="flex-1 flex flex-col items-center justify-center">
                <button onclick="readRealNFC()" 
                        class="w-52 h-52 rounded-full border-8 border-emerald-400 flex items-center justify-center hover:scale-105 active:scale-95 transition-all mb-8">
                    <div class="text-center">
                        <i class="fa-solid fa-nfc-symbol text-8xl text-emerald-400"></i>
                        <div class="text-xs mt-6 text-emerald-300">НАЖМИТЕ ДЛЯ ЧТЕНИЯ<br>РЕАЛЬНОЙ МЕТКИ</div>
                    </div>
                </button>
                <button onclick="simulateNFC()" 
                        class="text-xs px-8 py-4 border border-dashed border-zinc-400 text-zinc-400 rounded-3xl hover:text-white">
                    Эмуляция (если NFC не работает)
                </button>
            </div>

            <div id="reading" class="hidden flex-1 flex flex-col items-center justify-center">
                <div class="animate-spin w-16 h-16 border-4 border-emerald-400 border-t-transparent rounded-full mb-8"></div>
                <div class="text-xl">Сканирование NFC-метки...</div>
                <div class="text-xs text-zinc-500 mt-8">Приложите метку или телефон</div>
            </div>

            <div id="success" class="hidden flex-1 flex flex-col items-center justify-center text-center">
                <i class="fa-solid fa-check-circle text-8xl text-emerald-400 mb-6"></i>
                <div id="success-text" class="text-2xl font-medium">Метка считана</div>
                <div id="success-id" class="font-mono text-emerald-300 mt-4 text-sm"></div>
                <button onclick="resetScreen()" class="mt-16 px-10 py-4 bg-emerald-500 text-black rounded-3xl text-sm font-medium">НОВОЕ ЧТЕНИЕ</button>
            </div>
        </div>

        <div class="p-4 bg-zinc-900 border-t border-emerald-900 text-xs flex gap-2">
            <input id="aid-input" placeholder="AID терминала" class="flex-1 bg-zinc-800 rounded-2xl px-4 py-3 text-emerald-300 font-mono text-sm outline-none">
            <button onclick="setAID()" class="bg-emerald-600 px-8 rounded-2xl text-black font-medium">УСТАНОВИТЬ</button>
        </div>
    </div>

    <script>
        let currentAID = "A0000000031010";
        document.getElementById('aid-display').textContent = currentAID;

        const channel = new BroadcastChannel('nfc-pos-channel');

        async function readRealNFC() {
            if (!('NDEFReader' in window)) {
                alert("Web NFC не поддерживается в этом браузере.\n\nИспользуйте Android + Chrome.\n\nСейчас будет запущена эмуляция.");
                simulateNFC();
                return;
            }

            const readingScreen = document.getElementById('reading');
            const idleScreen = document.getElementById('idle');
            idleScreen.classList.add('hidden');
            readingScreen.classList.remove('hidden');

            try {
                const ndef = new NDEFReader();
                await ndef.scan();

                ndef.onreading = event => {
                    const record = event.message.records[0];
                    let id = "UNKNOWN";
                    if (record) {
                        if (record.recordType === "text") {
                            id = new TextDecoder().decode(record.data);
                        } else {
                            id = Array.from(new Uint8Array(record.data)).map(b => b.toString(16).padStart(2,'0')).join('').toUpperCase();
                        }
                    }

                    readingScreen.classList.add('hidden');
                    const successScreen = document.getElementById('success');
                    successScreen.classList.remove('hidden');
                    document.getElementById('success-id').textContent = "ID: " + id.slice(0,16);
                    document.getElementById('success-text').textContent = "NFC-метка считана успешно";

                    channel.postMessage({
                        type: 'REAL_NFC_READ',
                        id: id,
                        aid: currentAID,
                        timestamp: Date.now()
                    });

                    setTimeout(resetScreen, 3200);
                };

            } catch (err) {
                readingScreen.classList.add('hidden');
                idleScreen.classList.remove('hidden');
                alert("Ошибка NFC: " + err.message + "\n\nУбедитесь, что NFC включён и сайт открыт по HTTPS.");
            }
        }

        function simulateNFC() {
            const id = "04" + Math.floor(Math.random()*1000000000000).toString(16).toUpperCase();
            document.getElementById('idle').classList.add('hidden');
            const success = document.getElementById('success');
            success.classList.remove('hidden');
            document.getElementById('success-id').textContent = "ID: " + id;
            document.getElementById('success-text').innerHTML = 'ЭМУЛЯЦИЯ<br><span class="text-emerald-400 text-sm">реальная метка не найдена</span>';

            channel.postMessage({ type: 'REAL_NFC_READ', id: id, aid: currentAID, simulated: true });
        }

        function resetScreen() {
            document.getElementById('success').classList.add('hidden');
            document.getElementById('reading').classList.add('hidden');
            document.getElementById('idle').classList.remove('hidden');
        }

        function setAID() {
            const input = document.getElementById('aid-input').value.trim();
            if (input) {
                currentAID = input;
                document.getElementById('aid-display').textContent = currentAID;
                channel.postMessage({ type: 'TERMINAL_AID_SET', aid: currentAID });
            }
        }

        window.onload = () => {
            console.log("%cРеальный Web NFC активирован. Попробуй на Android Chrome с NFC-меткой.", "color:#10b981");
        };
    </script>
</body>
</html>
