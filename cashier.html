<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МЕГА ПОС — КАССА</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .header { font-family: 'Space Grotesk', sans-serif; }
        .card { transition: all 0.3s cubic-bezier(0.4,0,0.2,1); }
        .card:hover { transform: translateY(-8px); }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <div class="max-w-6xl mx-auto p-8">
        <div class="header text-6xl font-bold text-emerald-400 mb-2 tracking-tighter">МЕГА ПОС</div>
        <p class="text-emerald-400 mb-10">КАССА • Полноценный банк + товары</p>

        <div class="grid grid-cols-12 gap-8">
            <!-- Метки -->
            <div class="col-span-7 bg-zinc-900 rounded-3xl p-8">
                <div class="flex justify-between mb-6">
                    <h2 class="text-3xl font-semibold">Метки NFC</h2>
                    <button onclick="addNewTag()" class="bg-emerald-500 text-black px-8 py-4 rounded-3xl flex items-center gap-3">
                        <i class="fa-solid fa-plus"></i> НОВАЯ МЕТКА
                    </button>
                </div>
                <div id="tags-list" class="grid grid-cols-2 gap-6"></div>
            </div>

            <!-- Товары и действия -->
            <div class="col-span-5 space-y-8">
                <div class="bg-zinc-900 rounded-3xl p-8">
                    <h3 class="text-xl font-semibold mb-6">Товары</h3>
                    <div id="products-list" class="space-y-3"></div>
                    <button onclick="addProduct()" class="mt-6 text-sm w-full py-4 border border-dashed border-emerald-400 text-emerald-400 rounded-3xl">+ Добавить товар</button>
                </div>

                <button onclick="sendPaymentRequest()" 
                        class="w-full py-8 bg-gradient-to-r from-emerald-500 to-teal-400 text-black font-bold text-2xl rounded-3xl">
                    ОТПРАВИТЬ ЗАПРОС НА ТЕРМИНАЛ
                </button>
            </div>
        </div>

        <div class="mt-12 bg-zinc-900 rounded-3xl p-8">
            <h3 class="font-semibold mb-6">История операций</h3>
            <div id="history" class="space-y-4"></div>
        </div>
    </div>

    <script>
        let tags = JSON.parse(localStorage.getItem('tags_v5')) || [];
        let products = JSON.parse(localStorage.getItem('products')) || [
            {name: "Кофе", price: 180},
            {name: "Бургер", price: 450},
            {name: "Вода", price: 90}
        ];
        let history = [];

        function generateAID() {
            const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
            let s = "";
            for (let i = 0; i < 6; i++) s += chars[Math.floor(Math.random() * chars.length)];
            return s;
        }

        function save() {
            localStorage.setItem('tags_v5', JSON.stringify(tags));
            localStorage.setItem('products', JSON.stringify(products));
        }

        function addHistory(text) {
            history.unshift({time: new Date().toLocaleTimeString('ru-RU'), text});
            renderHistory();
        }

        function renderTags() {
            const container = document.getElementById('tags-list');
            container.innerHTML = tags.map((tag, i) => `
                <div class="card bg-zinc-800 rounded-3xl p-6 border ${tag.blocked?'border-red-500':'border-emerald-500'}">
                    <div class="flex justify-between">
                        <div>
                            <div class="font-mono text-emerald-400">${tag.aid}</div>
                            <div class="font-medium">${tag.owner}</div>
                            <div class="text-xs text-zinc-400">${tag.nfcId}</div>
                        </div>
                        <div class="text-right">
                            <div class="text-4xl font-light">${tag.balance} ₽</div>
                            <div class="flex gap-2 mt-6">
                                <button onclick="editTag(${i});event.stopImmediatePropagation()" class="text-xs px-5 py-2 border border-zinc-600 rounded-2xl">Изменить</button>
                                <button onclick="toggleBlock(${i});event.stopImmediatePropagation()" class="text-xs px-5 py-2 border border-zinc-600 rounded-2xl">${tag.blocked?'Разблокировать':'Заблокировать'}</button>
                                <button onclick="deleteTag(${i});event.stopImmediatePropagation()" class="text-xs px-5 py-2 bg-red-900 rounded-2xl">Удалить</button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderProducts() {
            const container = document.getElementById('products-list');
            container.innerHTML = products.map(p => `
                <div class="bg-zinc-800 rounded-2xl p-4 flex justify-between items-center">
                    <div>${p.name}</div>
                    <div class="font-medium">${p.price} ₽</div>
                </div>
            `).join('');
        }

        function renderHistory() {
            const container = document.getElementById('history');
            container.innerHTML = history.map(h => `
                <div class="bg-zinc-800 px-6 py-5 rounded-2xl flex gap-6">
                    <div class="font-mono text-emerald-400 w-20">${h.time}</div>
                    <div>${h.text}</div>
                </div>
            `).join('');
        }

        function addNewTag() {
            const owner = prompt("Имя владельца:", "Новый клиент");
            if (!owner) return;
            const nfcId = "04" + Math.random().toString(16).slice(2,14).toUpperCase();
            const aid = generateAID();
            tags.unshift({nfcId, aid, owner, balance: 3000, blocked: false});
            save();
            renderTags();
            addHistory(`Добавлена новая метка • ${aid}`);
        }

        function editTag(i) {
            const tag = tags[i];
            const newName = prompt("Новое имя владельца:", tag.owner);
            const newBalance = parseInt(prompt("Новый баланс:", tag.balance));
            if (newName) tag.owner = newName;
            if (!isNaN(newBalance)) tag.balance = newBalance;
            save();
            renderTags();
            addHistory("Метка отредактирована");
        }

        function toggleBlock(i) {
            tags[i].blocked = !tags[i].blocked;
            save();
            renderTags();
            addHistory(tags[i].blocked ? "Метка заблокирована" : "Метка разблокирована");
        }

        function deleteTag(i) {
            if (confirm("Удалить метку полностью?")) {
                tags.splice(i,1);
                save();
                renderTags();
                addHistory("Метка удалена");
            }
        }

        function addProduct() {
            const name = prompt("Название товара:");
            const price = parseInt(prompt("Цена товара:"));
            if (name && price) {
                products.push({name, price});
                save();
                renderProducts();
            }
        }

        function createNewTerminal() {
            const aid = generateAID();
            localStorage.setItem('current_terminal_aid', aid);
            alert("Новый терминал создан!\nAID: " + aid + "\n\nОткройте terminal.html на телефоне и введите этот AID");
            addHistory("Создан новый терминал • AID: " + aid);
        }

        function sendPaymentRequest() {
            const amount = parseInt(prompt("Сумма оплаты:", "890")) || 890;
            const aid = prompt("AID терминала (из terminal.html):", "KX9P2M");
            localStorage.setItem('pending_payment', JSON.stringify({aid, amount}));
            addHistory(`Запрос оплаты ${amount} ₽ отправлен на терминал ${aid}`);
            alert("Запрос отправлен на терминал. Откройте terminal.html");
        }

        window.onload = () => {
            if (tags.length === 0) {
                tags = [
                    {nfcId:"04A1B2C3D4E5", aid:"KX9P2M", owner:"Алексей Иванов", balance:12480, blocked:false},
                    {nfcId:"04F7A9B2C318", aid:"Q7W8V1", owner:"Мария Петрова", balance:3420, blocked:false}
                ];
            }
            renderTags();
            renderProducts();
            renderHistory();
        };
    </script>
</body>
</html>
