<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МЕГА ПОС — КАССА</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .header { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <div class="max-w-6xl mx-auto p-8">
        <div class="header text-6xl font-bold text-emerald-400 mb-1">МЕГА ПОС</div>
        <div class="text-emerald-400 mb-10">КАССА • Firebase подключена</div>

        <button onclick="addNewTag()" class="mb-10 bg-emerald-500 text-black px-10 py-5 rounded-3xl font-semibold flex items-center gap-3">
            <i class="fa-solid fa-plus"></i> ДОБАВИТЬ НОВУЮ МЕТКУ
        </button>

        <div class="grid grid-cols-2 gap-8">
            <div id="tags-list" class="space-y-4"></div>
            
            <div>
                <h3 class="text-xl mb-6 font-semibold text-emerald-400">ТЕРМИНАЛЫ</h3>
                <div id="terminal-list" class="space-y-4"></div>
                <button onclick="createTerminal()" class="mt-8 w-full py-6 border border-dashed border-emerald-400 text-emerald-400 rounded-3xl hover:bg-emerald-900">
                    + Новый терминал (QR)
                </button>
            </div>
        </div>

        <div class="mt-12 bg-zinc-900 rounded-3xl p-8">
            <h3 class="font-semibold mb-6">История операций</h3>
            <div id="history" class="space-y-4"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://cassa-simulator-4-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let tags = JSON.parse(localStorage.getItem('tags')) || [];
        let terminals = [];
        let history = [];

        function generateAID() {
            const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
            let s = "";
            for (let i = 0; i < 6; i++) s += chars[Math.floor(Math.random() * chars.length)];
            return s;
        }

        function addHistory(text) {
            history.unshift({time: new Date().toLocaleTimeString('ru-RU'), text});
            if (history.length > 15) history.pop();
            renderHistory();
        }

        function renderTags() {
            const container = document.getElementById('tags-list');
            container.innerHTML = tags.map((tag,i) => `
                <div class="bg-zinc-900 rounded-3xl p-6 flex justify-between items-center border ${tag.blocked?'border-red-500':'border-emerald-500'}">
                    <div>
                        <div class="font-mono text-emerald-400">${tag.aid}</div>
                        <div class="font-medium">${tag.owner}</div>
                    </div>
                    <div class="text-right">
                        <div class="text-4xl font-light">${tag.balance} ₽</div>
                        <div class="flex gap-3 mt-6">
                            <button onclick="toggleBlock(${i});event.stopImmediatePropagation()" class="text-xs px-6 py-2 border border-zinc-600 rounded-2xl">${tag.blocked?'Разблокировать':'Заблокировать'}</button>
                            <button onclick="deleteTag(${i});event.stopImmediatePropagation()" class="text-xs px-6 py-2 bg-red-900 rounded-2xl">Удалить</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderTerminals() {
            const container = document.getElementById('terminal-list');
            container.innerHTML = terminals.map((t,i) => `
                <div class="bg-zinc-900 rounded-3xl p-6 flex justify-between items-center">
                    <div class="font-mono text-emerald-400">${t.aid}</div>
                    <button onclick="sendPayment(${i})" class="bg-emerald-500 text-black px-8 py-4 rounded-3xl text-sm font-medium">Отправить запрос</button>
                </div>
            `).join('');
        }

        function renderHistory() {
            document.getElementById('history').innerHTML = history.map(h => `
                <div class="bg-zinc-800 p-5 rounded-2xl flex gap-6 text-sm">
                    <div class="font-mono text-emerald-400 w-20">${h.time}</div>
                    <div>${h.text}</div>
                </div>
            `).join('');
        }

        function addNewTag() {
            const owner = prompt("Имя владельца:", "Новый клиент");
            if (!owner) return;
            const aid = generateAID();
            tags.unshift({aid, owner, balance: 5000, blocked: false});
            localStorage.setItem('tags', JSON.stringify(tags));
            renderTags();
            addHistory(`Новая метка • ${aid}`);
        }

        function toggleBlock(i) {
            tags[i].blocked = !tags[i].blocked;
            localStorage.setItem('tags', JSON.stringify(tags));
            renderTags();
            addHistory(tags[i].blocked ? "Метка заблокирована" : "Метка разблокирована");
        }

        function deleteTag(i) {
            if (confirm("Удалить метку?")) {
                tags.splice(i,1);
                localStorage.setItem('tags', JSON.stringify(tags));
                renderTags();
                addHistory("Метка удалена");
            }
        }

        function createTerminal() {
            const aid = generateAID();
            terminals.unshift({aid});
            renderTerminals();
            addHistory("Новый терминал создан • AID: " + aid);
            alert("Терминал создан!\nAID: " + aid + "\n\nОткройте terminal.html на телефоне и введите этот AID");
        }

        function sendPayment(i) {
            const aid = terminals[i].aid;
            const amount = parseInt(prompt("Сумма оплаты:", "890")) || 890;
            
            db.ref('requests/' + aid).set({
                amount: amount,
                timestamp: Date.now(),
                status: "pending"
            });
            
            addHistory(`Запрос на ${amount} ₽ отправлен на терминал ${aid}`);
        }

        window.onload = () => {
            renderTags();
            renderTerminals();
            renderHistory();
        };
    </script>
</body>
</html>
